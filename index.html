<style>
  :root {
    --bg: #0e0e0f;
    --surface: #1a1a1c;
    --surface2: #242426;
    --border: #2e2e32;
    --text: #f0ede8;
    --text-sub: #8a8680;
    --go: #e8c547;
    --go-dim: #3a3010;
    --cheer: #e07850;
    --cheer-dim: #3a1e10;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  header {
    max-width: 480px;
    margin: 0 auto 2.5rem;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .site-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-sub);
    text-transform: uppercase;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
  }

  h1 span {
    color: var(--go);
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-sub);
    margin-top: 2px;
  }

  #events {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    transition: border-color 0.2s;
  }

  .card-date {
    font-family: 'DM Mono', monospace;
    font-size: 17px;
    letter-spacing: 0.1em;
    color: var(--text-sub);
    margin-bottom: 6px;
  }

  .card-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .card-detail {
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.6;
    margin-bottom: 1.25rem;
  }

  .counts {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1rem;
    align-items: flex-end;
  }

  .count-block {}

  .count-num {
    font-family: 'DM Mono', monospace;
    font-size: 32px;
    font-weight: 500;
    line-height: 1;
    display: block;
  }

  .count-num.go { color: var(--go); }
  .count-num.cheer { color: var(--cheer); }

  .count-label {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 3px;
  }

  .btns {
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 8px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    background: var(--surface2);
    color: var(--text);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn:active { transform: scale(0.97); }

  .btn.go-btn:hover, .btn.go-btn.active {
    background: var(--go-dim);
    border-color: var(--go);
    color: var(--go);
  }

  .btn.cheer-btn:hover, .btn.cheer-btn.active {
    background: var(--cheer-dim);
    border-color: var(--cheer);
    color: var(--cheer);
  }

  .btn.loading {
    opacity: 0.5;
    pointer-events: none;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.25rem 0 0;
  }

  footer {
    max-width: 480px;
    margin: 2rem auto 0;
    font-size: 12px;
    color: var(--text-sub);
    text-align: center;
    line-height: 1.8;
  }

  footer a {
    color: var(--text-sub);
  }

  .loading-screen {
    max-width: 480px;
    margin: 3rem auto;
    text-align: center;
    color: var(--text-sub);
    font-size: 14px;
  }

  .dot-anim::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card { animation: fadeIn 0.3s ease both; }
  .card:nth-child(2) { animation-delay: 0.07s; }
  .card:nth-child(3) { animation-delay: 0.14s; }
  .card:nth-child(4) { animation-delay: 0.21s; }
</style>

<footer>
  ボタンを押すとカウントが増えます<br>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwN3RM532aALCW538suNtGjMboq3s_S4IUUpKv9j0Tzk7JOB4JJXAcZOzhEeMBF7nE6/exec';
const STORAGE_KEY = 'saisal_myactions_v1';

function getMyActions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function setMyAction(id, action) {
  const a = getMyActions();
  if (a[id] === action) { delete a[id]; }
  else { a[id] = action; }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(a));
  return a[id] || null;
}

async function fetchEvents() {
  const res = await fetch(GAS_URL);
  return await res.json();
}

async function postAction(id, action, delta) {
  await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ id, action, delta }),
    headers: { 'Content-Type': 'text/plain' }
  });
}

function renderEvents(events) {
  const myActions = getMyActions();
  const container = document.getElementById('events');
  container.innerHTML = '';

  if (!events.length) {
    container.innerHTML = '<div class="loading-screen">現在のイベントはありません</div>';
    return;
  }

  events.forEach(ev => {
    const myAction = myActions[ev.id] || null;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-date">${ev.date}</div>
      <div class="card-title">${ev.title}</div>
      <div class="card-detail">${ev.detail}</div>
      <div class="counts">
        <div class="count-block">
          <span class="count-num go" id="go-${ev.id}">${ev.go}</span>
          <div class="count-label">行くよ！</div>
        </div>
        <div class="count-block">
          <span class="count-num cheer" id="cheer-${ev.id}">${ev.cheer}</span>
          <div class="count-label">応援してる</div>
        </div>
      </div>
      <div class="btns">
        <button class="btn go-btn ${myAction==='go'?'active':''}" id="btn-go-${ev.id}" onclick="handleBtn('${ev.id}','go')">
          💃 ${myAction==='go' ? '行く予定！' : '行くよ！'}
        </button>
        <button class="btn cheer-btn ${myAction==='cheer'?'active':''}" id="btn-cheer-${ev.id}" onclick="handleBtn('${ev.id}','cheer')">
          📣 ${myAction==='cheer' ? '応援中！' : '応援してる'}
        </button>
      </div>
      <hr class="divider">
    `;
    container.appendChild(card);
  });
}

async function handleBtn(id, action) {
  const btnGo = document.getElementById('btn-go-' + id);
  const btnCheer = document.getElementById('btn-cheer-' + id);
  const goNum = document.getElementById('go-' + id);
  const cheerNum = document.getElementById('cheer-' + id);

  btnGo.classList.add('loading');
  btnCheer.classList.add('loading');

  const myActions = getMyActions();
  const prev = myActions[id] || null;
  const next = setMyAction(id, action);

  // ① 画面を即時更新（サーバー待たずに）
  if (prev && prev !== action) {
    // 別のボタンから切り替え：前のをキャンセル
    if (prev === 'go') goNum.textContent = Math.max(0, parseInt(goNum.textContent) - 1);
    if (prev === 'cheer') cheerNum.textContent = Math.max(0, parseInt(cheerNum.textContent) - 1);
  }
  if (next === action) {
    if (action === 'go') goNum.textContent = parseInt(goNum.textContent) + 1;
    if (action === 'cheer') cheerNum.textContent = parseInt(cheerNum.textContent) + 1;
  } else {
    if (action === 'go') goNum.textContent = Math.max(0, parseInt(goNum.textContent) - 1);
    if (action === 'cheer') cheerNum.textContent = Math.max(0, parseInt(cheerNum.textContent) - 1);
  }

  // ボタンの見た目も即時更新
  btnGo.className = `btn go-btn ${next === 'go' ? 'active' : ''}`;
  btnGo.innerHTML = `💃 ${next === 'go' ? '行く予定！' : '行くよ！'}`;
  btnCheer.className = `btn cheer-btn ${next === 'cheer' ? 'active' : ''}`;
  btnCheer.innerHTML = `📣 ${next === 'cheer' ? '応援中！' : '応援してる'}`;

  // ② バックグラウンドでサーバーに送信（await しない）
  if (prev && prev !== action) postAction(id, prev, -1);
  if (next === action) {
    postAction(id, action, 1);
  } else {
    postAction(id, action, -1);
  }
}

fetchEvents().then(renderEvents).catch(() => {
  document.getElementById('events').innerHTML =
    '<div class="loading-screen">読み込みに失敗しました。時間をおいて再試行してください。</div>';
});
</script>
